openapi: 3.1.0
info:
  title: "[Nome da API]"
  version: "1.0.0"
  description: "Contrato resumido de API para implementacao e validacao rapida."

servers:
  - url: "http://localhost:3000"
    description: "Local"

tags:
  - name: System
  - name: Resources

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [System]
      summary: "Health check"
      security: []
      responses:
        "200":
          description: "Servico operacional"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /resources:
    get:
      tags: [Resources]
      summary: "Lista recursos"
      responses:
        "200":
          description: "Lista de recursos"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceListResponse"
    post:
      tags: [Resources]
      summary: "Cria recurso"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResourceRequest"
      responses:
        "201":
          description: "Recurso criado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"

  /resources/{id}:
    get:
      tags: [Resources]
      summary: "Detalhe de recurso"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Recurso encontrado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Resources]
      summary: "Atualiza parcialmente recurso"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateResourceRequest"
      responses:
        "200":
          description: "Recurso atualizado"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Resources]
      summary: "Remove recurso"
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: "Recurso removido"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    NotFound:
      description: "Recurso nao encontrado"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "ok"

    CreateResourceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateResourceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    Resource:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time

    ResourceListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Resource"

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string