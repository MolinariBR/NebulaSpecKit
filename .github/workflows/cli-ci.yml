name: CLI CI

on:
  push:
    branches:
      - main
    paths:
      - "CLI/src/**/*.py"
      - "CLI/tests/**/*.py"
      - "CLI/pyproject.toml"
      - "CLI/README.md"
      - ".github/workflows/cli-*.yml"
  pull_request:
    branches:
      - main
    paths:
      - "CLI/src/**/*.py"
      - "CLI/tests/**/*.py"
      - "CLI/pyproject.toml"
      - "CLI/README.md"
      - ".github/workflows/cli-*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cli-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Test, Build and Package Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest build twine

      - name: Run tests
        working-directory: CLI
        run: python -m pytest -q

      - name: Build distributions
        working-directory: CLI
        run: python -m build

      - name: Check package metadata
        working-directory: CLI
        run: python -m twine check dist/*
