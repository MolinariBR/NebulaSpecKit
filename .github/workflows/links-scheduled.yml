name: Link Check (Scheduled)

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: links-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  external-links:
    name: Check External Links
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: >
            --no-progress
            --exclude-mail
            --retry-wait-time 2
            --max-retries 2
            --max-concurrency 8
            --timeout 20
            --cache
            --max-cache-age 1d
            "./**/*.md"
          fail: true
          format: markdown
          output: lychee/external-links.md

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-links-report-${{ github.run_id }}
          path: lychee/external-links.md
          if-no-files-found: ignore
          retention-days: 14
